<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baratie Linktree</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #632617;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            margin-bottom: 25px;
        }

        .logo {
            width: 150px;
            height: auto;
        }

        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .link-button {
            display: flex;
            align-items: center;
            background-color: #D9D9D9;
            color: #000000;
            text-decoration: none;
            padding: 15px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 14px;
            transition: transform 0.2s, background-color 0.2s;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .link-button:hover {
            transform: scale(1.02);
            background-color: #cbEbeE;
        }

        .link-button i {
            font-size: 20px;
            width: 30px;
            text-align: left;
            color: #632617;
        }

        .link-text {
            flex: 1;
            text-align: center;
            padding-right: 30px;
        }

        .footer-info {
            color: #FFFFFF;
            font-size: 12px;
            line-height: 1.6;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <svg class="logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M50 5C55 5 65 15 65 25C65 28 60 30 55 32C62 35 70 42 62 55C55 60 45 60 38 55C30 42 38 35 45 32C40 30 35 28 35 25C35 15 45 5 50 5Z" fill="#E5A93C"/>
                <path d="M40 35L25 45L42 48Z" fill="#E5A93C"/>
                <path d="M48 35L33 46L46 47Z" fill="#E5A93C"/>
                <path d="M30 50C35 58 45 65 50 65C55 65 65 58 70 50C55 52 45 52 30 50Z" fill="#E5A93C"/>
                <path d="M42 56C45 56 48 58 52 56C55 58 58 56 58 56C55 60 45 60 42 56Z" fill="#632617"/>
            </svg>
            <h1 style="color: #E5A93C; font-size: 28px; letter-spacing: 2px; margin-top: 10px; margin-bottom: 2px;">BARATIE</h1>
            <p style="color: #E5A93C; font-size: 11px; letter-spacing: 1px; font-weight: bold;">FLOATING RESTAURANT<br>GRAND LINE</p>
        </div>

        <div class="links-container">
            <a href="apresentacao.html" class="link-button" data-destination="cardapio">
                <i class="fa-solid fa-book-open"></i>
                <span class="link-text">Cardápio Digital</span>
            </a>

            <a href="reservas.html" class="link-button" data-destination="reservas">
                <i class="fa-solid fa-calendar-days"></i>
                <span class="link-text">Reservas</span>
            </a>

            <a href="avaliacao.html" class="link-button" data-destination="pesquisa">
                <i class="fa-regular fa-star"></i>
                <span class="link-text">Pesquisa De Satisfação</span>
            </a>

            <a href="#" class="link-button" data-destination="informacoes">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span class="link-text">Mais Informações</span>
            </a>

            <a href="atendimento.html" class="link-button" data-destination="whatsapp">
                <i class="fa-brands fa-whatsapp"></i>
                <span class="link-text">Fale Conosco</span>
            </a>

            <a href="#" class="link-button" data-destination="instagram">
                <i class="fa-brands fa-instagram"></i>
                <span class="link-text">Instagram</span>
            </a>
        </div>

        <div class="footer-info">
            <p>Horário de Funcionamento: Seg a Sext - 11:30 às 23:00</p>
            <p>Sab e Dom - 12:00 às 20:00</p>
        </div>
    </div>

    <script>
        document.querySelectorAll('.link-button').forEach(button => {
            button.addEventListener('click', function(e) {
                e.preventDefault();
                const target = this.getAttribute('data-destination');
                
                if(target === 'cardapio') {
                    window.location.href = 'apresentacao.html';
                } else if(target === 'reservas') {
                    window.location.href = 'reservas.html';
                } else if(target === 'pesquisa') {
                    window.location.href = 'avaliacao.html';
                } else if(target === 'informacoes') {
                    window.location.href = 'informacoes.html';
                } else if(target === 'whatsapp') {
                    window.location.href = 'atendimento.html';
                } else if(target === 'instagram') {
                    window.location.href = 'https://www.instagram.com/baratie.burguer/';
                }
            });
        });
    </script>
</body>
</html>
