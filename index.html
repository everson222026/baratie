<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baratie - Menu Interativo (Crossover)</title>
    <style>
        :root {
            --color-primary: #ff8800; 
            --color-accent: #ffd700;  
            --color-text: #fff;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --font-title: 'Comic Sans MS', cursive, sans-serif; 
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            font-family: var(--font-main);
            background-color: #000; 
            color: var(--color-text);
        }

        #main-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('https://static.wikia.nocookie.net/onepiece/images/5/5d/Baratie_Ad.png/revision/latest?cb=20210223123904'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background-image 0.5s ease-in-out;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        #top-icons {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            gap: 15px;
        }

        .ui-icon {
            width: 40px;
            height: 40px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .ui-icon:hover {
            background-color: rgba(255, 255, 255, 0.4);
            border-color: var(--color-accent);
            transform: scale(1.1);
        }

        #header {
            text-align: center;
            z-index: 5;
            margin-bottom: 30px;
            pointer-events: none; 
        }

        #main-title {
            font-family: var(--font-title);
            font-size: 8rem;
            color: var(--color-primary);
            text-shadow: 4px 4px 0px #000, 
                         -4px -4px 0px #000, 
                         4px -4px 0px #000, 
                         -4px 4px 0px #000,
                         0px 0px 15px var(--color-accent);
            margin: 0;
            animation: titlePulse 2s infinite ease-in-out;
        }

        #subtitle {
            font-size: 1.5rem;
            color: #eee;
            margin-top: -10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        
        #menu-button {
            background-color: #f7a01b; 
            color: #000;
            border: 4px solid #000;
            padding: 18px 50px;
            font-size: 2.2rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0px 12px 0px #000, 0px 18px 25px rgba(0,0,0,0.6);
            transition: all 0.1s ease;
            font-family: var(--font-main);
            display: inline-block;
            text-decoration: none; 
            position: relative;
            overflow: hidden;
            z-index: 5;
        }

        #menu-button:hover {
            transform: translateY(-4px);
            box-shadow: 0px 15px 0px #000, 0px 25px 30px rgba(255, 136, 0, 0.5);
            background-color: var(--color-accent); 
        }

        #menu-button:active {
            transform: translateY(8px);
            box-shadow: 0px 4px 0px #000, 0px 8px 15px rgba(0,0,0,0.4);
        }

        
        #menu-button::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 40%;
            height: 200%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255,255,255,0.8),
                transparent
            );
            transform: skewX(-25deg);
            transition: all 0.6s;
            opacity: 0;
        }

        #menu-button:active::after {
            left: 150%;
            opacity: 1;
            transition: 0.7s;
        }

        #footer-elements {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            box-sizing: border-box;
            z-index: 5;
        }

        #spongebob-icon {
            width: 120px; 
            transition: all 0.3s ease;
            cursor: pointer;
        }

        #spongebob-icon:hover {
            transform: scale(1.1) rotate(5deg);
        }

        #krusty-krab-sign {
            width: 100px;
            margin-top: 10px;
        }
        #menu-button {
    pointer-events: all;
    z-index: 20;          
    position: relative;
}
        @keyframes titlePulse {
            0%, 100% { transform: scale(1); text-shadow: 0 0 15px var(--color-accent); }
            50% { transform: scale(1.03); text-shadow: 0 0 25px var(--color-primary); }
        }
    </style>
</head>
<body>

    <div id="main-container">
        <div id="overlay"></div>

   
        <div id="top-icons">
            <div class="ui-icon" title="Início"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></div>
            <div class="ui-icon" title="Carrinho"><svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg></div>
            <div class="ui-icon" title="Configurações"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.3-.06.61-.06.94s.02.64.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 0 .17-.47.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.21.07-.47-.12-.61l-2.03-1.58zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg></div>
        </div>

        <div id="header">
            <h1 id="main-title">BARATIE</h1>
            <p id="subtitle">Restaurante Marítimo - Os Melhores Sabores de Todos os Mares</p>
        </div>

        <div id="menu-button-container" style="z-index: 10; position: relative;">
    <a href="cardapio.html" id="menu-button">VER CARDÁPIO</a>
</div>

        <div id="footer-elements">
            <div id="spongebob-kitchen">
                <img src="https://thfvnext.bing.com/th/id/R.dd5e054d08432023fe2822543adb5d05?rik=qZka1ZxjPgndUA&pid=ImgRaw&r=0" 
                     id="spongebob-icon" alt="Chef SpongeBob" title="Chef SpongeBob (Siri Cascudo) - Clique!">
                
                <img src="https://lh3.googleusercontent.com/pw/AP1GczO3mDtLSuX1Vt_LK0Okwa9ClNNex27hRR59LAMcNCAUouyDqH-cp6xlVyLQ3rloJdPvnmHVqKC5n77zDh2SuD1imypiWaQrDGj3fi4UBScTtNS4HEsLoJPAejsMtMRZWx_pdHSBnvmdxMg_SpDgZe1c=w505-h494-s-no-gm?authuser=0" 
                     id="krusty-krab-sign" alt="esfera do dragao">
            </div>

            <div id="anime-characters">
                <img src="https://images-wixmp-ed30a86b8c4ca887773594c2.wixmp.com/f/51158316-fd7e-48ca-b5fe-8542e9dfe357/dfe05rx-242ac6e9-bda7-4d70-9be7-2a33a11a1fe5.png/v1/fill/w_833,h_959/zoro_and_sanji_by_bodskih_dfe05rx-pre.png?token=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1cm46YXBwOjdlMGQxODg5ODIyNjQzNzNhNWYwZDQxNWVhMGQyNmUwIiwiaXNzIjoidXJuOmFwcDo3ZTBkMTg4OTgyMjY0MzczYTVmMGQ0MTVlYTBkMjZlMCIsIm9iaiI6W1t7ImhlaWdodCI6Ijw9MTYwMCIsInBhdGgiOiJcL2ZcLzUxMTU4MzE2LWZkN2UtNDhjYS1iNWZlLTg1NDJlOWRmZTM1N1wvZGZlMDVyeC0yNDJhYzZlOS1iZGE3LTRkNzAtOWJlNy0yYTMzYTExYTFmZTUucG5nIiwid2lkdGgiOiI8PTEzOTEifV1dLCJhdWQiOlsidXJuOnNlcnZpY2U6aW1hZ2Uub3BlcmF0aW9ucyJdfQ.RSgJzMxcnlp-7mCCwfSLoGiLWJC2HS6dH_EuYYHBd4Y" 
                     class="character-icon active-state" 
                     style="width: 260px; cursor: help;" 
                     title="Sanji vs Zoro! O Chef do Baratie não gosta de desperdício!">
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const menuButton = document.getElementById('menu-button');
            const mainContainer = document.getElementById('main-container');
            const spongebobIcon = document.getElementById('spongebob-icon');
            const animeCharacters = document.querySelectorAll('.character-icon');

            // Hover no botão
            menuButton.addEventListener('mouseover', () => {
                mainContainer.style.boxShadow = 'inset 0 0 120px rgba(255, 136, 0, 0.6)';
            });

            menuButton.addEventListener('mouseout', () => {
                mainContainer.style.boxShadow = 'none';
            });

            
            menuButton.addEventListener('click', (e) => {
               
                menuButton.style.transition = 'transform 0.1s';
                menuButton.style.transform = 'scale(0.92)';
                
                setTimeout(() => {
                    menuButton.style.transform = 'scale(1)';
                }, 150);
            });

           
            spongebobIcon.addEventListener('click', () => {
                spongebobIcon.style.animation = 'shakeSpongebob 0.5s ease-in-out';
                setTimeout(() => spongebobIcon.style.animation = 'none', 500);
            });

       
            animeCharacters.forEach(char => {
                char.addEventListener('mouseover', () => {
                    char.style.transition = 'all 0.3s';
                    char.style.opacity = '1'; 
                    char.style.transform = 'scale(1.15)'; 
                });
                char.addEventListener('mouseout', () => {
                    char.style.opacity = '0.85'; 
                    char.style.transform = 'scale(1)'; 
                });
            });
        });

        
        const styleSheet = document.createElement("style");
        styleSheet.innerText = `
            @keyframes titlePulse {
                0%, 100% { transform: scale(1); text-shadow: 0 0 15px var(--color-accent); }
                50% { transform: scale(1.03); text-shadow: 0 0 25px var(--color-primary); }
            }

            @keyframes shakeSpongebob {
                0%, 100% { transform: translateX(0); }
                20%, 60% { transform: translateX(-8px) rotate(-8deg); }
                40%, 80% { transform: translateX(8px) rotate(8deg); }
            }
        `;
        document.head.appendChild(styleSheet);
    </script>
</body>
</html>
